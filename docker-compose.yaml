services:
  postgres:
    image: postgres:15
    container_name: olist_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d
      - ./data/raw:/data/raw
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: